<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Management Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

<div class="container-fluid dashboard">

<h4 class="mb-4">Employee Management Dashboard</h4>

<div class="row">

<!-- LEFT -->
<div class="col-md-4">

<div class="card p-3 mb-3">
<h6>Total Workforce</h6>
<h3 id="totalCount">0</h3>
</div>

<div class="card p-3">
<h6>Department Distribution</h6>
<p>HR: <span id="hrCount">0</span></p>
<p>IT: <span id="itCount">0</span></p>
<p>Finance: <span id="finCount">0</span></p>
</div>

</div>

<!-- RIGHT -->
<div class="col-md-8">

<div class="card p-3 mb-3">
<h6>Employee Record Management</h6>

<div class="row g-2">
<div class="col-md-6">
<input class="form-control" placeholder="ID" id="id">
</div>
<div class="col-md-6">
<input class="form-control" placeholder="Full Name" id="name">
</div>

<div class="col-md-6">
<select class="form-select" id="dept">
<option value="HR">HR</option>
<option value="IT">IT</option>
<option value="Finance">Finance</option>
</select>
</div>

<div class="col-md-6">
<input class="form-control" placeholder="Email" id="email">
</div>

<div class="col-md-12">
<input class="form-control" placeholder="Salary" id="salary">
</div>
</div>

<div class="mt-3">
<button class="btn btn-success" onclick="addEmp()">Add Employee</button>
<button class="btn btn-primary" onclick="updateEmp()">Update</button>
<button class="btn btn-secondary" onclick="resetForm()">Reset</button>
</div>

</div>

</div>
</div>

<!-- TABLE -->
<div class="card p-3 mt-4">

<div class="search-box mb-3">
<input class="form-control" placeholder="Search by name" id="search">
<select class="form-select" id="filterDept">
<option value="">All Departments</option>
<option value="HR">HR</option>
<option value="IT">IT</option>
<option value="Finance">Finance</option>
</select>
</div>

<table class="table table-hover">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Email</th>
<th>Salary</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<div class="d-flex justify-content-between">
<button class="btn btn-outline-secondary" onclick="prevPage()">Previous</button>
<button class="btn btn-outline-secondary" onclick="nextPage()">Next</button>
</div>

</div>

</div>

<script>

let employees = [];
let currentPage = 1;
let editId = null;

// LOAD DATA
function load(){
 axios.get('http://localhost:5000/employees')
 .then(res=>{
   employees = res.data;
   render();
 });
}

// RENDER TABLE + STATS
function render(){

 let filtered = employees.filter(e =>
   (e.name || "").toLowerCase().includes(search.value.toLowerCase()) &&
   (filterDept.value=="" || e.dept===filterDept.value)
 );

 let start = (currentPage-1)*5;
 let data = filtered.slice(start, start+5);

 let html='';
 data.forEach(e=>{
  html += `<tr>
  <td>${e.id}</td>
  <td>${e.name}</td>
  <td>${e.dept}</td>
  <td>${e.email}</td>
  <td>${e.salary}</td>
  <td>
    <button class="btn btn-sm btn-warning" onclick="editEmp(${e.id})">Edit</button>
    <button class="btn btn-sm btn-danger" onclick="deleteEmp(${e.id})">Delete</button>
  </td>
  </tr>`;
 });

 document.getElementById("table").innerHTML = html;

 updateStats(); // 🔥 ALWAYS UPDATE STATS
}

// ADD
function addEmp(){
 const emp = {
  id: document.getElementById("id").value.trim(),
  name: document.getElementById("name").value.trim(),
  dept: document.getElementById("dept").value,
  email: document.getElementById("email").value.trim(),
  salary: document.getElementById("salary").value.trim()
 };

 axios.post('http://localhost:5000/employees', emp).then(()=>{
  load();
  resetForm();
 });
}

// EDIT
function editEmp(id){
 const emp = employees.find(e=>e.id==id);

 document.getElementById("id").value = emp.id;
 document.getElementById("name").value = emp.name;
 document.getElementById("dept").value = emp.dept;
 document.getElementById("email").value = emp.email;
 document.getElementById("salary").value = emp.salary;

 editId = id;
}

// UPDATE
function updateEmp(){
 const emp = {
  id: document.getElementById("id").value,
  name: document.getElementById("name").value,
  dept: document.getElementById("dept").value,
  email: document.getElementById("email").value,
  salary: document.getElementById("salary").value
 };

 axios.put('http://localhost:5000/employees/'+editId, emp).then(()=>{
  load();
  resetForm();
 });
}

// DELETE
function deleteEmp(id){
 if(confirm("Are you sure?")){
   axios.delete('http://localhost:5000/employees/'+id).then(load);
 }
}

// RESET
function resetForm(){
 document.getElementById("id").value="";
 document.getElementById("name").value="";
 document.getElementById("email").value="";
 document.getElementById("salary").value="";
 editId=null;
}

// PAGINATION
function nextPage(){
 currentPage++;
 render();
}

function prevPage(){
 if(currentPage>1) currentPage--;
 render();
}

// 🔥 FIXED STATS FUNCTION
function updateStats(){

 let hr = 0, it = 0, fin = 0;

 employees.forEach(e => {
   let dept = (e.dept || "").trim().toLowerCase();

   if(dept === "hr") hr++;
   else if(dept === "it") it++;
   else if(dept === "finance") fin++;
 });

 document.getElementById("totalCount").innerText = employees.length;
 document.getElementById("hrCount").innerText = hr;
 document.getElementById("itCount").innerText = it;
 document.getElementById("finCount").innerText = fin;
}

// EVENTS
search.onkeyup = render;
filterDept.onchange = render;

// INIT
load();

</script>

</body>
</html>
